name: pages

# Compiles the engine to JavaScript with TeaVM and publishes the playable demo
# to https://egnaro9.github.io/match3-engine/ — so the board on that page is
# always running the engine currently on main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-pages-${{ hashFiles('**/*.gradle') }}
      - name: Compile Java -> JavaScript
        run: ./gradlew :demo-js:generateJavaScript --console=plain --no-daemon
      - name: Assemble the demo site
        run: |
          mkdir -p site
          cp demo/index.html demo/app.js site/
          cp demo-js/build/generated/teavm/js/match3.js site/
          echo "Bundle: $(wc -c < site/match3.js) bytes raw, $(gzip -c site/match3.js | wc -c) gzipped"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
